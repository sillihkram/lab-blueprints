name = "rhel9-guest00"
description = "Blueprint for a CIS Level 1 compliant Red Hat Enterprise Linux 9 System build."
version = "0.0.24"
modules = []
groups = []
distro = "rhel-9.5"

[[packages]]
name = "ansible-collection-redhat-rhel_mgmt"
version = "*"

[[packages]]
name = "ansible-core"
version = "*"

[[packages]]
name = "net-tools"
version = "*"

[[packages]]
name = "openscap-scanner"
version = "*"

[[packages]]
name = "rhel-system-roles"

[[packages]]
name = "scap-security-guide"

[[packages]]
name = "setroubleshoot"

[[packages]]
name = "vim-enhanced"

[[packages]]
name = "sudo"
version = "*"

[[packages]]
name = "libpwquality"
version = "*"

[[packages]]
name = "systemd-journal-remote"
version = "*"

[[packages]]
name = "firewalld"
version = "*"

[[packages]]
name = "nftables"
version = "*"

[[packages]]
name = "libselinux"
version = "*"

[[packages]]
name = "chrony"
version = "*"

[[packages]]
name = "audit-libs"
version = "*"

[[packages]]
name = "audit"
version = "*"

[customizations]
hostname = "localhost"

# --- 100 GiB CIS partition layout ---

[[customizations.filesystem]]
mountpoint = "/"
minsize = 26843545600   # 25 GiB

[[customizations.filesystem]]
mountpoint = "/tmp"
minsize = 8589934592    # 8 GiB

[[customizations.filesystem]]
mountpoint = "/home"
minsize = 10737418240   # 10 GiB

[[customizations.filesystem]]
mountpoint = "/var"
minsize = 37580963840    # 35 GiB

[[customizations.filesystem]]
mountpoint = "/var/log"
minsize = 8589934592    # 8 GiB

[[customizations.filesystem]]
mountpoint = "/var/log/audit"
minsize = 8589934592    # 8 GiB

[[customizations.filesystem]]
mountpoint = "/var/tmp"
minsize = 6442450944    # 6 GiB

[customizations.kernel]
append = "audit_backlog_limit=8192 audit=1"

[[customizations.user]]
name = "admin"
description = "Administrator"
password = "$6$skMsN2VVuSw1y1fw$5PJOJNieWK.TGzT9lew8ROQ//6h2cRt5Kfx/iih4fRIfjUDOL2E1cxOwaja.S7B5T7htXvp6r3iICTA1gpRDx/"
key = ""
home = "/home/admin"
shell = "/bin/bash"
groups = ["users", "wheel"]

[customizations.locale]
keyboard = "us-mac"

[customizations.services]
enabled = ["auditd", "crond", "firewalld", "systemd-journald"]
masked = ["cups", "nfs-server", "rpcbind", "avahi-daemon", "autofs", "bluetooth", "nftables"]

[customizations.openscap]
datastream = "/usr/share/xml/scap/ssg/content/ssg-rhel9-ds.xml"
profile_id = "xccdf_org.ssgproject.content_profile_cis_server_l1"
